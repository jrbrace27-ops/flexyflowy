// ===== HELPERS =====
function getCategory(score) {
  if (score <= 25) return { cat: 'A', label: 'Tier 3', css: 'badge-cat-a', desc: 'No/Weak Site', pkg: 'Full Contractor Lead System', price: '$499 setup + $79/mo', setup: 499, monthly: 79 };

  return { cat: 'C', label: 'Tier 1', css: 'badge-cat-c', desc: 'Good Site', pkg: 'Intake Install', price: '$99 setup + $19/mo', setup: 99, monthly: 19 };
}

function tradeBadgeClass(trade) {
  return 'badge-' + trade.toLowerCase();
}

function getScoreColor(score) {
  if (score <= 25) return '#ef4444';
  if (score <= 60) return '#eab308';
  return '#22c55e';
}

function encodeContractor(c) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(c))));
}

function decodeContractor(b64) {
  try { return JSON.parse(decodeURIComponent(escape(atob(b64)))); } catch(e) { return null; }
}

// ===== ROUTING =====
function getRoute() {
  const hash = window.location.hash || '#/';
  if (hash.startsWith('#/demo/')) {
    const rest = hash.slice(7); // after '#/demo/'
    const qIdx = rest.indexOf('?d=');

    return { view: 'demo', id, data: d };
  }
  return { view: 'dashboard' };
}

              <th>Trade</th>
              <th>Score</th>
              <th>Category</th>
              <th>Recommended Package</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <footer class="footer-dash">
        <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
      </footer>
    </div>
  `;

  renderRows(CONTRACTORS);
  bindDashboardEvents();
}

function renderRows(list) {
  const tbody = document.getElementById('tableBody');
  if (!tbody) return;
  tbody.innerHTML = list.map(c => {
    const cat = getCategory(c.score);
    const encoded = encodeContractor(c);
    const demoUrl = `#/demo/${c.id}?d=${encoded}`;
    return `
      <tr data-testid="row-contractor-${c.id}">
        <td>
          <div class="biz-name">${c.name}</div>
          <div class="biz-phone">${c.phone}</div>
        </td>
        <td><span class="badge badge-trade ${tradeBadgeClass(c.trade)}">${c.trade}</span></td>
        <td>
          <span class="score-bar"><span class="score-fill" style="width:${c.score}%;background:${getScoreColor(c.score)}"></span></span>
          <span class="score-text" style="color:${getScoreColor(c.score)}">${c.score}</span>
        </td>
        <td><span class="badge ${cat.css}">${cat.label}</span></td>
        <td>
          <div class="pkg-text">${cat.pkg}</div>
          <div class="pkg-price">${cat.price}</div>
        </td>
        <td style="display:flex;gap:8px;align-items:center;">
            <a href="${demoUrl}" class="btn-demo" data-testid="btn-demo-${c.id}">View Demo →</a>
            <a href="mailto:${c.email}?subject=FlexFlow%20Onboarding%20—%20${encodeURIComponent(c.name)}&body=Hi%20${encodeURIComponent(c.name)}%2C%0A%0AHere%20is%20your%20FlexFlow%20onboarding%20form%3A%20https%3A%2F%2FONBOARDING_FORM_URL%0A%0A—%20Jacob%20Brace%20%7C%20716-909-9317" class="btn-demo" style="background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.3);" data-testid="btn-onboard-${c.id}">Onboard →</a>
          </td>
      </tr>
    `;
  }).join('');
}

function bindDashboardEvents() {
  let activeFilter = 'all';
  let searchTerm = '';

  function filterAndRender() {
    let list = CONTRACTORS;
    if (activeFilter !== 'all') {
      list = list.filter(c => getCategory(c.score).cat === activeFilter);
    }
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(q) || c.trade.toLowerCase().includes(q) || c.phone.includes(q));
    }
    renderRows(list);
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      filterAndRender();
    });
  });

  const searchInput = document.querySelector('.search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      filterAndRender();
    });
  }
}

// ===== CHATBOT ENGINE =====
function initChat(contractor) {
  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');

  let history = []; // { role: 'bot'|'user', text: string }
  let usedResponses = new Set();
  let exchangeCount = 0;
  let isStreaming = false;
  let contactOffered = false;

  const welcomeMsg = `Hi! I'm the AI intake assistant powered by FlexFlow. I can answer questions about ${contractor.name}'s services, collect your project details, and help schedule a free estimate — 24/7. How can I help you today?`;

  // Flow definitions
  const flows = [
    {
      id: 'greeting',
      triggers: ['hi', 'hello', 'hey', 'good morning', 'good afternoon'],
      responses: [
        "Hey there! Happy to help. Are you reaching out about an emergency, looking for a quote, or something else?",
        "Hello! Welcome — are you looking for a quote, have an emergency, or need general info?",
        "Hi! Great to connect. What can I help you with today — emergency service, a quote, or scheduling?"
      ]
    },
    {
      id: 'emergency',
      triggers: ['furnace', 'heat', 'broken', 'not working', 'emergency', 'pipe', 'leak', 'burst', 'flood', 'no hot water'],
      responses: [
        "That sounds urgent — I want to make sure we get someone to you quickly. Can I get your name and address? Also, is this your primary heat source, and roughly how old is the unit?",
        "I understand — that's stressful. Let me connect you with our emergency team right away. What's your name and the best address to send someone to?",
        "We take emergencies seriously. Let me get your info so we can dispatch help ASAP. Name, address, and a quick description of what happened?"
      ]
    },
    {
      id: 'quote',
      triggers: ['cost', 'price', 'quote', 'estimate', 'how much', 'pricing', 'rate', 'afford', 'budget', 'expensive'],
      responses: [
        "Great question — pricing depends on the scope of the job, but I can connect you with our team for a free, no-obligation estimate. What's the best number to reach you, and what's the project about?",
        "We'd love to give you an accurate quote. Every job is a little different, so a quick call or on-site visit gets you the best pricing. Can I grab your number and a few project details?",
        "Our estimates are always free and no-pressure. Tell me a bit about the project and the best way to reach you, and I'll have someone follow up."
      ]
    },
    {
      id: 'availability',
      triggers: ['open', 'available', 'hours', 'weekend', 'appointment', 'schedule', 'book', 'when', 'today', 'tomorrow'],
      responses: [
        "We handle emergency calls 7 days a week. For routine service and estimates, our team is available Monday through Saturday. Want me to help you get something on the calendar?",
        "Great timing — we have availability this week. We're open Monday–Saturday for scheduled work, and 24/7 for emergencies. What day works best for you?",
        "We keep our schedule flexible to fit our customers. Let me know what type of service you need, and I'll find the best time slot."
      ]
    },
    {
      id: 'area',
      triggers: ['area', 'serve', 'location', 'buffalo', 'where', 'zip', 'cheektowaga', 'amherst', 'tonawanda'],
      responses: [
        "We serve the greater Buffalo area including Cheektowaga, Amherst, Tonawanda, West Seneca, Lackawanna, and surrounding communities. Share your zip code and I'll confirm right away.",
        "Our coverage area is the full Buffalo metro — from North Tonawanda down to Orchard Park, and east to Williamsville. Drop your zip code and I'll let you know if you're in our zone.",
        "Yes, we cover a wide area across Western New York! Most Buffalo-area zip codes are within our service range. What's your location?"
      ]
    }
  ];

  const contactPrompts = [
    "Before I forget — can I grab your name and best phone number so our team can follow up with you directly?",
    "I want to make sure you get a real answer from our team. What's the best number and time to reach you?",
    "Let me get you connected with our pros. Can you share your name and a callback number?"
  ];

  const fallbacks = [
    "Good question. Let me make sure I get you to the right person. Can you share a bit more about what you need, and the best way to reach you?",
    "I want to make sure I give you the right answer. Could you tell me a bit more about your situation? And what's the best way to reach you?",
    "That's a great question for our team. Let me grab some details so the right person can get back to you — what's the project about, and what's your phone number?"
  ];

  function getUnusedResponse(options) {
    const available = options.filter(r => !usedResponses.has(r));
    if (available.length === 0) {
      usedResponses.clear();
      return options[Math.floor(Math.random() * options.length)];
    }
    const choice = available[Math.floor(Math.random() * available.length)];
    usedResponses.add(choice);
    return choice;
  }

  function matchFlow(text) {
    const lower = text.toLowerCase();
    for (const flow of flows) {
      if (flow.triggers.some(t => lower.includes(t))) {
        return getUnusedResponse(flow.responses);
      }
    }
    return null;
  }

  function getBotResponse(userText) {
    exchangeCount++;
    const matched = matchFlow(userText);

    // After 2 exchanges, proactively offer contact collection
    if (exchangeCount >= 2 && !contactOffered) {
      contactOffered = true;
      if (matched) {
        return matched;
      }
      return getUnusedResponse(contactPrompts);
    }

    if (matched) return matched;
    return getUnusedResponse(fallbacks);
  }

  function addMessage(text, role, stream = false) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `msg msg-${role}`;
    messagesEl.appendChild(msgDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    if (stream && role === 'bot') {
      return new Promise(resolve => {
        isStreaming = true;
        sendBtn.disabled = true;
        let i = 0;
        msgDiv.innerHTML = '<span class="cursor"></span>';
        const interval = setInterval(() => {
          if (i < text.length) {
            msgDiv.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
            messagesEl.scrollTop = messagesEl.scrollHeight;
            i++;
          } else {
            clearInterval(interval);
            msgDiv.textContent = text;
            isStreaming = false;
            sendBtn.disabled = false;
            inputEl.focus();
            resolve();
          }
        }, 25);
      });
    } else {
      msgDiv.textContent = text;
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return Promise.resolve();
    }
  }

  function handleSend() {
    if (isStreaming) return;
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';

    addMessage(text, 'user');
    history.push({ role: 'user', text });

    const response = getBotResponse(text);
    history.push({ role: 'bot', text: response });

    setTimeout(() => addMessage(response, 'bot', true), 400);
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // Welcome message with streaming
  setTimeout(() => addMessage(welcomeMsg, 'bot', true), 500);
}

  if (route.view === 'demo') {
    renderDemo(route);
    document.body.style.background = '#f8fafc';
  } else {
    renderDashboard();
    document.body.style.background = '#0f172a';
  }
}

window.addEventListener('hashchange', render);
render();
